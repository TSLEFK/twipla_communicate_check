name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Release作成に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create zip
        run: |
          mkdir dist
          zip -r dist/extension.zip . -x "*.git*" "dist/*" ".github/*"

      - name: Generate SHA256
        run: |
          cd dist
          sha256sum extension.zip > extension.zip.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/extension.zip
            dist/extension.zip.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}